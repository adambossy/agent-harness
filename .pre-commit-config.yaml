# Pre-commit hooks. Forces clean linting and formatting before every commit.
# Install: `uv run pre-commit install`
# Run all: `uv run pre-commit run --all-files`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Use the project's own config (pyproject.toml: [tool.mypy])
        args: [--config-file=pyproject.toml]
        # Type stubs / runtime deps mypy needs to import successfully.
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-graph>=0.0.20
          - pytest>=8.0
        # Mypy resolves modules itself; pass nothing on the command line.
        pass_filenames: false
